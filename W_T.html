<!DOCTYPE html>
<html>

<head>
<title>Text Tool</title>
</head>

<body>

<h2>Text Analysis Tool</h2>

<textarea id="text" rows="5" cols="40"></textarea>
<br><br>

<button onclick="analyze()">Analyze</button>

<p id="result"></p>

<script>

function analyze(){

var t = document.getElementById("text").value;

// empty check
if(t == ""){
alert("Enter text");
return;
}

// character count
var charCount = t.length;

// word count
var words = t.trim().split(" ");
var wordCount = words.length;

// reverse text
var rev = t.split("").reverse().join("");

// show result
document.getElementById("result").innerHTML =
"Characters: " + charCount + "<br>" +
"Words: " + wordCount + "<br>" +
"Reverse: " + rev;

}

</script>

</body>
</html>
